name: Test streb init with direct download fallback

on: workflow_dispatch

jobs:
  test-direct-download-fallback:
    name: streb init (Win + WSL) - direct download fallback
    runs-on: windows-latest
    steps:
      - name: Setup WSL
        uses: Vampire/setup-wsl@v6
        with:
          distribution: Ubuntu-22.04

      - name: Download test streb binary (WSL)
        shell: wsl-bash {0}
        run: |
          curl -L -o /usr/local/bin/streb "https://github.com/sebholstein/streb-windows-test/releases/download/test-v1/streb-test"
          chmod +x /usr/local/bin/streb

      - name: Verify streb binary (WSL)
        shell: wsl-bash {0}
        run: streb --version 2>&1

      - name: Install Claude (WSL)
        shell: wsl-bash {0}
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Run streb init (WSL)
        env:
          STREB_AIHUB_KEY: ${{ secrets.AI_HUB_KEY }}
        shell: wsl-bash {0}
        run: |
          mkdir -p test-project
          cd test-project
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          streb init --headless --auth-method aihub --skip-prereqs --skip-claude --skip-beads --yes --no-color --verbose 2>&1
        continue-on-error: true

      - name: Run claude (WSL)
        if: always()
        shell: wsl-bash {0}
        run: claude -p "test 123" 2>&1

      - name: Show results (WSL)
        if: always()
        shell: wsl-bash {0}
        run: |
          echo "=== .claude directory ==="
          find test-project/.claude -type f 2>/dev/null || echo "Not found"
          echo ""
          echo "=== .beads directory ==="
          find test-project/.beads -type f 2>/dev/null || echo "Not found"
          echo ""
          echo "=== bd version ==="
          bd version 2>&1 || echo "bd not found"
          echo ""
          echo "=== claude version ==="
          claude --version 2>&1
