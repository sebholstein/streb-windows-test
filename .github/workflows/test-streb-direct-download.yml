name: Test streb init with direct download fallback

on: workflow_dispatch

jobs:
  test-direct-download-fallback:
    name: streb init (Win + WSL) - direct download fallback
    runs-on: windows-latest
    steps:
      - name: Setup WSL
        uses: Vampire/setup-wsl@v6
        with:
          distribution: Ubuntu-22.04

      - name: Download test streb binary
        run: |
          $url = "https://github.com/sebholstein/streb-windows-test/releases/download/test-v1/streb-test.exe"
          $installDir = "$env:LOCALAPPDATA\streb-test"
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "$installDir\streb.exe" -UseBasicParsing

      - name: Verify streb binary
        shell: wsl-bash {0}
        run: /mnt/c/Users/runneradmin/AppData/Local/streb-test/streb.exe --version 2>&1

      - name: Install Claude (WSL)
        shell: wsl-bash {0}
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc

      - name: Run streb init (WSL)
        env:
          STREB_AIHUB_KEY: ${{ secrets.AI_HUB_KEY }}
        shell: wsl-bash {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p test-project
          cd test-project
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          /mnt/c/Users/runneradmin/AppData/Local/streb-test/streb.exe init --headless --auth-method aihub --skip-prereqs --skip-claude --skip-beads --yes --no-color --verbose 2>&1
        continue-on-error: true

      - name: Verify aihub key saved (WSL)
        if: always()
        shell: wsl-bash {0}
        run: |
          echo "AIHUB key character count:"
          cat ~/.streb/aihub-key 2>/dev/null | wc -c || echo "File not found"

      - name: Configure AI-Hub for Claude (WSL)
        if: always()
        shell: wsl-bash {0}
        env:
          AI_HUB_KEY: ${{ secrets.AI_HUB_KEY }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ~/.claude
          printf '{"apiKey": "env:ANTHROPIC_API_KEY", "env": {"ANTHROPIC_BASE_URL": "https://adesso-ai-hub.3asabc.de", "ANTHROPIC_API_KEY": "env:ANTHROPIC_API_KEY"}}\n' > ~/.claude/settings.json
          echo "ANTHROPIC_API_KEY=$AI_HUB_KEY" >> ~/.bashrc
          echo "ANTHROPIC_BASE_URL=https://adesso-ai-hub.3asabc.de" >> ~/.bashrc
          echo "Configured AI-Hub settings.json"

      - name: Run claude (WSL)
        if: always()
        shell: wsl-bash {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          claude -p "test 123" 2>&1

      - name: Show results (WSL)
        if: always()
        shell: wsl-bash {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "=== .claude directory ==="
          find test-project/.claude -type f 2>/dev/null || echo "Not found"
          echo ""
          echo "=== .beads directory ==="
          find test-project/.beads -type f 2>/dev/null || echo "Not found"
          echo ""
          echo "=== bd version ==="
          bd version 2>&1 || echo "bd not found"
          echo ""
          echo "=== claude version ==="
          claude --version 2>&1
