name: Test Windows Install

on: workflow_dispatch

jobs:
  test-scoop-latest:
    name: Scoop Latest (Win 2025)
    runs-on: windows-latest
    steps:
      - name: Install Scoop
        run: |
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          echo "$env:USERPROFILE\scoop\shims" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Show Scoop version
        run: scoop --version

      - name: Install streb
        run: |
          scoop bucket add streb https://github.com/adesso-ai/homebrew-streb
          scoop install streb

      - name: Test streb binary
        run: |
          streb --version

      - name: Run streb init
        run: |
          mkdir test-project
          cd test-project
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          streb init --skip-auth --skip-claude --skip-beads --skip-bdui --skip-plugins --skip-dagger --skip-container-use --skip-ralph --skip-jira --yes --no-color --verbose 2>&1
        continue-on-error: true

      - name: Run streb init minimal profile
        run: |
          mkdir test-project-minimal
          cd test-project-minimal
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          streb init --profile minimal --skip-auth --skip-claude --skip-beads --skip-bdui --skip-plugins --skip-dagger --skip-container-use --skip-ralph --skip-jira --yes --no-color --verbose 2>&1
        continue-on-error: true

  test-scoop-old:
    name: Scoop Pinned Old (Win 2022)
    runs-on: windows-2022
    steps:
      - name: Install old Scoop and pin it
        run: |
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          echo "$env:USERPROFILE\scoop\shims" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          cd "$env:USERPROFILE\scoop\apps\scoop\current"
          git log --oneline -5
          git checkout $(git rev-list -1 --before="2025-06-01" HEAD)
          scoop --version

      - name: Install streb
        run: |
          scoop bucket add streb https://github.com/adesso-ai/homebrew-streb
          scoop install streb
        continue-on-error: true

      - name: Test streb binary
        if: always()
        run: streb --version 2>&1
        continue-on-error: true

      - name: Run streb init
        if: always()
        run: |
          mkdir test-project
          cd test-project
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          streb init --skip-auth --skip-claude --skip-beads --skip-bdui --skip-plugins --skip-dagger --skip-container-use --skip-ralph --skip-jira --yes --no-color --verbose 2>&1
        continue-on-error: true

      - name: Diagnostics
        if: always()
        run: |
          echo "=== Scoop version ==="
          scoop --version
          echo ""
          echo "=== App directory ==="
          cmd /c dir "$env:USERPROFILE\scoop\apps\streb" 2>$null
          echo ""
          echo "=== Current junction ==="
          cmd /c dir "$env:USERPROFILE\scoop\apps\streb\current" 2>$null
          echo ""
          echo "=== Shim file ==="
          Get-Content "$env:USERPROFILE\scoop\shims\streb.shim" 2>$null
          echo ""
          echo "=== Test direct exe ==="
          $versions = Get-ChildItem "$env:USERPROFILE\scoop\apps\streb" -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -ne "current" }
          foreach ($v in $versions) {
            $exe = Join-Path $v.FullName "streb.exe"
            if (Test-Path $exe) {
              echo "Direct exe: $exe"
              & $exe --version 2>&1
            }
          }

