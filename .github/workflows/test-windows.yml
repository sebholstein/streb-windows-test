name: Test Windows Install

on: workflow_dispatch

jobs:
  test-scoop-latest:
    name: Scoop Latest (Win 2025)
    runs-on: windows-latest
    steps:
      - name: Install Scoop
        run: |
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          echo "$env:USERPROFILE\scoop\shims" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Show Scoop version
        run: scoop --version

      - name: Install streb
        run: |
          scoop bucket add streb https://github.com/adesso-ai/homebrew-streb
          scoop install streb

      - name: Test streb binary
        run: streb --version

      - name: Run streb init
        env:
          CI: ""
        run: |
          mkdir test-project
          cd test-project
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          streb init --skip-auth --skip-claude --yes --no-color --verbose 2>&1
        continue-on-error: true

      - name: Show init results
        if: always()
        run: |
          echo "=== .claude directory ==="
          Get-ChildItem -Recurse test-project\.claude -ErrorAction SilentlyContinue | Select-Object FullName
          echo ""
          echo "=== .beads directory ==="
          Get-ChildItem -Recurse test-project\.beads -ErrorAction SilentlyContinue | Select-Object FullName
          echo ""
          echo "=== bd version ==="
          bd version 2>&1
          echo ""
          echo "=== bdui version ==="
          bdui --version 2>&1

  test-scoop-old:
    name: Scoop Pinned Old (Win 2022)
    runs-on: windows-2022
    steps:
      - name: Install old Scoop and pin it
        run: |
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          echo "$env:USERPROFILE\scoop\shims" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          cd "$env:USERPROFILE\scoop\apps\scoop\current"
          git log --oneline -5
          git checkout $(git rev-list -1 --before="2025-06-01" HEAD)
          scoop --version

      - name: Install streb
        run: |
          scoop bucket add streb https://github.com/adesso-ai/homebrew-streb
          scoop install streb
        continue-on-error: true

      - name: Test streb binary
        if: always()
        run: streb --version 2>&1
        continue-on-error: true

      - name: Run streb init
        if: always()
        env:
          CI: ""
        run: |
          mkdir test-project
          cd test-project
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          streb init --skip-auth --skip-claude --yes --no-color --verbose 2>&1
        continue-on-error: true

      - name: Diagnostics
        if: always()
        run: |
          echo "=== Scoop version ==="
          scoop --version
          echo ""
          echo "=== Shim file ==="
          Get-Content "$env:USERPROFILE\scoop\shims\streb.shim" 2>$null
          echo ""
          echo "=== bd version ==="
          bd version 2>&1
          echo ""
          echo "=== .claude directory ==="
          Get-ChildItem -Recurse test-project\.claude -ErrorAction SilentlyContinue | Select-Object FullName

  test-scoop-very-old:
    name: Scoop Very Old (Win 2022)
    runs-on: windows-2022
    steps:
      - name: Install very old Scoop
        run: |
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          echo "$env:USERPROFILE\scoop\shims" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          cd "$env:USERPROFILE\scoop\apps\scoop\current"
          git checkout $(git rev-list -1 --before="2025-01-01" HEAD)
          scoop --version

      - name: Install streb
        run: |
          scoop bucket add streb https://github.com/adesso-ai/homebrew-streb
          scoop install streb
        continue-on-error: true

      - name: Test streb binary
        if: always()
        run: streb --version 2>&1
        continue-on-error: true

      - name: Run streb init
        if: always()
        env:
          CI: ""
        run: |
          mkdir test-project
          cd test-project
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          streb init --skip-auth --skip-claude --yes --no-color --verbose 2>&1
        continue-on-error: true

      - name: Diagnostics
        if: always()
        run: |
          echo "=== Scoop version ==="
          scoop --version
          echo ""
          echo "=== bd version ==="
          bd version 2>&1
          echo ""
          echo "=== .claude directory ==="
          Get-ChildItem -Recurse test-project\.claude -ErrorAction SilentlyContinue | Select-Object FullName
